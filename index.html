<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lalit Aditya Julapalli</title>

    <!-- Caveat: handwritten-style font, weights 400 (regular) and 700 (bold) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">

        <main class="hero">

            <div class="portrait-column">
                <div class="portrait-wrapper">
                    <img
                        src="images/portrait.png"
                        alt="Portrait of Lalit Aditya Julapalli"
                        class="portrait"
                    >
                    <img
                        src="images/portrait_smile.png"
                        alt=""
                        class="portrait portrait-smile"
                    >
                    <img
                        src="images/portrait_smile_teeth.png"
                        alt=""
                        class="portrait portrait-smile"
                    >
                </div>
            </div>

            <div class="content-column">

                <h1 class="name">Lalit Aditya Julapalli</h1>

                <p class="bio">Math & Computing @ GaTech </p>

                <hr class="divider">

                <p class="belief">I build things I use every day.</p>

                <section class="recent-work" aria-labelledby="recent-work-title">
                    <h2 id="recent-work-title">What I’m most recently working on</h2>
                    <div class="recent-work-card" id="recent-work-card" aria-live="polite">
                        <p class="recent-work-loading">Checking GitHub…</p>
                    </div>
                </section>

                <div class="links">

                    <a href="https://github.com/lalitj5" class="icon-btn"   target="_blank" rel="noopener noreferrer">
                        <img src="icons/github_logo.png" alt="github_logo" class="icon-image">
                    </a>

                    <a href="https://substack.com/@lalitj5" class="icon-btn" target="_blank" rel="noopener noreferrer">
                       <img src="icons/substack_logo.png" width="400" alt="substack_logo" class="icon-image">
                    </a>

                    <a href="https://www.linkedin.com/in/lalit-julapalli/" class="icon-btn" target="_blank" rel="noopener noreferrer">
                        <img src="icons/linkedin_logo.png" alt="linkedin_logo" class="icon-image">
                    </a>

                    <a href="https://aibutsimple.com" class="icon-btn" target="_blank" rel="noopener noreferrer">
                        <img src="icons/aibutsimple_logo.png" alt="aibutsimple_logo" class="icon-image">
                    </a>

                </div>

            </div>

        </main>

        <section class="portfolio" aria-label="Work">

            <div class="tab-bar" role="tablist" aria-label="Portfolio sections">
                <button
                    class="tab is-active"
                    role="tab"
                    id="tab-projects"
                    aria-selected="true"
                    aria-controls="panel-projects"
                >Projects</button>
                <button
                    class="tab"
                    role="tab"
                    id="tab-writing"
                    aria-selected="false"
                    aria-controls="panel-writing"
                    tabindex="-1"
                >Writing</button>
            </div>

            <div class="tab-panels">
                <div
                    class="tab-panel"
                    id="panel-projects"
                    role="tabpanel"
                    aria-labelledby="tab-projects"
                >
                    <div class="card-grid" id="grid-projects"></div>
                </div>
                <div
                    class="tab-panel"
                    id="panel-writing"
                    role="tabpanel"
                    aria-labelledby="tab-writing"
                    hidden
                >
                    <div class="card-grid" id="grid-writing"></div>
                </div>
            </div>

        </section>

    </div>

    <div class="preview-backdrop" hidden></div>

    <aside class="preview-panel" aria-hidden="true" aria-labelledby="preview-title" aria-modal="true">
        <div class="preview-panel-inner">
            <button class="preview-close" type="button" aria-label="Close preview">&times;</button>

            <div class="preview-image-wrap">
                <img class="preview-image" src="" alt="">
            </div>

            <div class="preview-content">
                <p class="preview-meta"></p>
                <h2 class="preview-title" id="preview-title"></h2>
                <p class="preview-description"></p>
                <a class="preview-link" href="#" target="_blank" rel="noopener noreferrer"></a>
            </div>
        </div>
    </aside>

    <script src="content.js"></script>
    <script src="main.js"></script>

</body>
</html>
